<!DOCTYPE html>
<html>
<head>
    <title>CSS Challenge</title>

    <!-- External CSS -->
    <link rel="stylesheet" href="styles.css">

    <!-- Internal CSS -->
    <style>
        article {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0);
        }
    </style>
</head> <body>

<div class="container">

    <article>
        <h1>My Article</h1>
        <p>This is a sample article card.</p>
    </article>

    <footer>
        <p>Contact us for more info</p>

        <!-- Inline CSS -->
        <button style="background-color: rgb(120, 139, 0); color: white; padding: 10px 20px;">
            Contact Us
        </button>
    </footer>

</div>

</body>
</html>
